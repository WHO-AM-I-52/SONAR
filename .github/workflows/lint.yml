name: Lint (ruff)

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - dev

jobs:
  lint:
    name: Ruff lint check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: |
          ruff check . \
            --select E,W,F \
            --ignore E501,E402 \
            --exclude WPy,uploads,reports,db,Bacup \
            --output-format github
